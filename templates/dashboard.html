<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WorkTrack Admin Dashboard</title>
	<style>
		body { font-family: 'Segoe UI', Arial, sans-serif; padding:24px; backgound: #f8f9fa; color: #333; margin: 0; }
                 .dashboard-container { max-width: 1200px; margin: 0 auto; }
                 h1 { color: #2c3e50; font-size: 26px; font-weight: 600; margin-bottom: 20px; }
                 .stats { background: white; padding: 16px 20 px; border-radius: 8px; margin-bottom: 24px; box-shadow: 0 4 px 6px rgba(0,0,0,0.05); display: inline-block; font-size: 15px; border-left: 4 px solid #2ecc71; } 
                 .stats strong { color: #2c3e50; } 
                 .table-responsive { background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; } 
                 table { width: 100% border-collapse: collapse; text-align: left; } 
                 th { background: #2c3e50; color: white; padding: 14px 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05px; }
                 td { padding: 14px 16px; border-bottom: 1px solid #eef2f3; color: #4a5568; font-size: 15px; }
                 tr:nth-child(even) { background-color: #fcfdfd; }
                 tr:hover { background: #f1f5f9;
                 transition: background-color 0.2s ease; } 
                 .badge { background: #2ecc71; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block: }
                  .emp-id { font-weight: bold; color: #2c3e50; } 
	</style>
</head>
<body>
        <div class="dashboard-container">
	<h1>WorkTrack - Admin Dashboard</h1>
	<div class = "stats>
		<strong>Total Check-ins:</strong> {{ records|length }}
	</div>
        <div class="table-responsive">
	<table>
		<thead>
			<tr>
				<th>ID</th>
				<th>Employee ID</th>
				<th>Name</th>
				<th>Latitude</th>
				<th>Longitude</th>
				<th>Time</th>
			</tr>
		</thead>
		<tbody>
			{% for r in records %}
			<tr>
				<td><span class="badge">#{{ r.id }}</span></td>
				<td>{{ r.employee_id }}</td>
				<td>{{ r.employee_name }}</td>
				<td>{{ r.latitude }}</td>
				<td>{{ r.longitude }}</td>
				<td>{{ r.checkin_time }}</td>
			</tr>
			{% endfor %}
		</tbody>
	</table>
         </div>
         </div>
	<script>
		setTimeout(() => location.reload(), 5000);
	</script>
</body>
</html>
